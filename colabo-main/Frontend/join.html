<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unirme a pizarra — Colabo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/join.css" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb o1"></div>
    <div class="orb o2"></div>
  </div>

  <div class="page-center">
    <a href="index.html" class="logo">
      <span class="logo-mark">◈</span>
      <span class="logo-text">colabo</span>
    </a>

    <div class="join-card" id="joinCard">
      <div class="join-icon">🔗</div>
      <h1 class="join-title">Unirme a una<br /><em>pizarra</em></h1>
      <p class="join-sub">Pega el link o código de la pizarra a la que quieres acceder.</p>

      <form id="joinForm" novalidate>
        <div class="field-wrap">
          <input
            type="text" id="joinInput"
            class="join-input"
            placeholder="colabo.app/b/abc123 o código"
            autocomplete="off" autocorrect="off" spellcheck="false"
          />
          <button type="submit" class="join-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
        <div class="join-error" id="joinError" style="display:none">
          Pizarra no encontrada. Verifica el link o código.
        </div>
      </form>

      <!-- PASSWORD STEP (hidden by default) -->
      <div class="pw-step" id="pwStep" style="display:none">
        <div class="divider"><span>Esta pizarra requiere contraseña</span></div>
        <div class="field-wrap">
          <input
            type="password" id="pwInput"
            class="join-input"
            placeholder="Contraseña de acceso"
          />
          <button class="join-btn" id="pwEnterBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          </button>
        </div>
        <div class="join-error" id="pwError" style="display:none">
          Contraseña incorrecta
        </div>
      </div>

      <div class="join-alt">
        <span>¿Quieres crear tu propia pizarra?</span>
        <a href="new-board.html">Crear pizarra →</a>
      </div>
    </div>

    <!-- RECENT JOINED (from localStorage) -->
    <div class="recent-wrap" id="recentWrap" style="display:none">
      <div class="recent-label">Visitadas recientemente</div>
      <div class="recent-list" id="recentList"></div>
    </div>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/join.js"></script>
</body>
</html>
